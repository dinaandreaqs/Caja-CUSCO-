<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción Caja Cusco</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; font-family: Arial, sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 0.4s ease-in-out;
            background-image: url('Gemini_Generated_Image_ (2).png');
            overflow: hidden;
        }

        .logo-esquina {
            position: absolute; top: 20px; left: 20px; width: 150px; z-index: 100;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
        }

        .pantalla { display: none; text-align: center; width: 100%; padding: 0 20px; }
        .pantalla.activa {
            display: flex; flex-direction: column; align-items: center;
            animation: aparecer 0.35s ease;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== Pantalla 1: título ===== */
        .tarjeta-titulo {
            margin-bottom: 36px;
        }
        .tarjeta-titulo img {
            max-width: 560px; width: 100%; display: block;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(0,0,0,0.35));
        }

        /* ===== Wayki (pantalla 2) ===== */
        .contenedor-wayki {
            position: absolute; bottom: 6%; left: 8%;
            display: flex; flex-direction: column; align-items: center;
        }

        .wayki-saludando {
            width: 160px;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
        }

        /* Nube clásica */
        .globo-texto {
            background: white; padding: 20px 26px; border-radius: 20px;
            border: 3px solid #1A1310; font-weight: bold; font-size: 19px;
            margin-bottom: 12px; position: relative; cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.25);
            min-width: 250px; max-width: 320px;
            transition: transform 0.1s ease;
        }
        .globo-texto:hover { transform: translateY(-2px); }
        .globo-texto::after {
            content: ''; position: absolute; bottom: -13px; left: 50%; margin-left: -10px;
            border-width: 13px 10px 0; border-style: solid;
            border-color: #1A1310 transparent;
        }

        .btn-opcion {
            background-color: #FBC02D; border: 3px solid #1A1310;
            padding: 14px 34px; border-radius: 50px; font-weight: 900;
            font-size: 18px; color: #1A1310; cursor: pointer;
            text-transform: uppercase; box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-opcion:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.25); }
        .btn-opcion:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.25); }

        /* ===== Pantalla 3: bienvenida final ===== */
        .tarjeta-bienvenida {
            background: rgba(255,255,255,0.94);
            border: 3px solid #1A1310;
            border-radius: 24px;
            padding: 44px 40px;
            max-width: 460px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .tarjeta-bienvenida img.logo-bienvenida {
            width: 160px; margin: 0 auto 22px; display: block;
        }
        .tarjeta-bienvenida h1 {
            margin: 0 0 16px; font-size: 27px; color: #1A1310;
        }
        .tarjeta-bienvenida p {
            margin: 0 0 28px; font-size: 16px; color: #1A1310; line-height: 1.55;
        }

        @media (max-width: 600px) {
            .contenedor-wayki { left: 50%; transform: translateX(-50%); bottom: 4%; }
            .wayki-saludando { width: 120px; }
            .globo-texto { font-size: 16px; min-width: 200px; max-width: 260px; padding: 16px 20px; }
            .tarjeta-titulo { padding: 22px 24px; }
            .logo-esquina { width: 100px; }
        }
    </style>
</head>
<body>

    <img src="logo_caja_cusco-removebg.png" alt="Logo Caja Cusco" class="logo-esquina">

    <div id="pantalla1" class="pantalla activa">
        <div class="tarjeta-titulo">
            <img src="qhapaq ñan del nuevo colaborador.png" alt="Qhapaq Ñan del nuevo colaborador">
        </div>
        <button class="btn-opcion" onclick="avanzar(2)">¡Iniciemos!</button>
    </div>

    <div id="pantalla2" class="pantalla">
        <div class="contenedor-wayki">
            <!-- Texto que cambia al hacer clic -->
            <div id="textoWayki" class="globo-texto" onclick="cambiarTexto()" tabindex="0"
                 onkeypress="if(event.key==='Enter')cambiarTexto()">Hola, soy Wayki</div>
            <img src="saludando-removebg-preview.png" class="wayki-saludando" alt="Wayki saludando">
        </div>
    </div>

    <div id="pantalla3" class="pantalla">
        <div class="tarjeta-bienvenida">
            <img src="logo_caja_cusco-removebg.png" alt="Caja Cusco" class="logo-bienvenida">
            <h1>¡Bienvenido a Caja Cusco!</h1>
            <p>A partir de hoy formas parte de nuestro equipo. Este recorrido es solo el primer paso del camino que vamos a construir juntos.</p>
            <button class="btn-opcion" onclick="avanzar(1)">Volver a recorrer</button>
        </div>
    </div>

    <script>
        let paso = 0;
        function avanzar(num) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById('pantalla' + num).classList.add('activa');
            if (num === 1) {
                document.body.style.backgroundImage = "url('Gemini_Generated_Image_ (2).png')";
                paso = 0;
                document.getElementById('textoWayki').innerText = "Hola, soy Wayki";
            } else if (num === 2) {
                document.body.style.backgroundImage = "url('Gemini_Generated_Image_6w26hm6w26hm6w26.png')";
            } else if (num === 3) {
                document.body.style.backgroundImage = "url('Gemini_Generated_Image_6w26hm6w26hm6w26.png')";
            }
        }

        function cambiarTexto() {
            paso++;
            let divTexto = document.getElementById('textoWayki');
            if (paso === 1) {
                divTexto.innerText = "Yo te acompañaré en este recorrido";
            } else if (paso === 2) {
                // Al segundo clic, avanza directamente
                avanzar(3);
            }
        }
    </script>
</body>
</html>
